# Generate the Xcode project with XcodeGen:
#   brew install xcodegen
#   cd ios && xcodegen generate
#
# Before building, change:
#   1. bundleIdPrefix below (and the widget's PRODUCT_BUNDLE_IDENTIFIER)
#   2. The App Group in App.entitlements, Widget.entitlements, and Shared/Models.swift
#   3. DEVELOPMENT_TEAM to your Apple team ID (or set signing in Xcode)

name: NotchAI
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    # DEVELOPMENT_TEAM: YOURTEAMID

targets:
  NotchAI:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: NotchAI
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes: [notchai]
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Connects to the NotchAI relay running on your Mac.
    entitlements:
      path: App/App.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yourname.notchai
    dependencies:
      - target: ClaudeStatusWidgetExtension
        embed: true

  ClaudeStatusWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Claude Code
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Widget/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yourname.notchai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.NotchAI.widget
